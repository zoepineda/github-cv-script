<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zoe Pineda - PR Contributions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@400;500;600;700&family=Hubot+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* GitHub Primer Dark mode — actual token values */
        --color-canvas-default: #0d1117;
        --color-canvas-subtle: #161b22;
        --color-canvas-inset: #010409;
        --color-border-default: #30363d;
        --color-border-muted: #21262d;

        /* Text — Primer fg tokens */
        --color-fg-default: #e6edf3;
        --color-fg-muted: #7d8590;
        --color-fg-subtle: #6e7681;

        /* Accent — Primer accent-fg */
        --color-accent: #2f81f7;
        --color-accent-emphasis: #1f6feb;

        /* Semantic — Primer status colors */
        --color-success: #3fb950;
        --color-danger: #f85149;
        --color-purple: #d2a8ff;
        --color-orange: #d29922;

        /* Category labels — GitHub-style label colors */
        --color-cat-frontend-bg: #1a2332;
        --color-cat-frontend-fg: #79c0ff;
        --color-cat-backend-bg: #271a35;
        --color-cat-backend-fg: #d2a8ff;
        --color-cat-fullstack-bg: #1a2e1f;
        --color-cat-fullstack-fg: #7ee787;
        --color-cat-other-bg: #2a2114;
        --color-cat-other-fg: #d29922;

        /* Type labels */
        --color-type-feature-bg: #1a2e1f;
        --color-type-feature-fg: #7ee787;
        --color-type-fix-bg: #271a35;
        --color-type-fix-fg: #d2a8ff;
        --color-type-refactor-bg: #1a2332;
        --color-type-refactor-fg: #79c0ff;
        --color-type-other-bg: #1c1e23;
        --color-type-other-fg: #7d8590;

        /* Spacing scale (4pt base) */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 24px;
        --space-6: 32px;
        --space-7: 48px;
        --space-8: 64px;

        /* Type */
        --font-body: "Mona Sans", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        --font-display: "Hubot Sans", "Mona Sans", sans-serif;
        --font-mono: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, monospace;

        --text-xs: 0.6875rem;
        --text-sm: 0.8125rem;
        --text-base: 0.9375rem;
        --text-lg: 1.125rem;
        --text-xl: clamp(1.25rem, 1.1rem + 0.5vw, 1.5rem);
        --text-2xl: clamp(1.5rem, 1.2rem + 1vw, 2rem);

        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-body);
        font-size: var(--text-base);
        background: var(--color-canvas-default);
        color: var(--color-fg-default);
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }

      /* --- Layout --- */
      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: var(--space-7) var(--space-5);
      }

      /* --- Page header --- */
      .page-header {
        margin-bottom: var(--space-7);
      }

      .page-header h1 {
        font-family: var(--font-display);
        font-size: var(--text-2xl);
        font-weight: 700;
        color: var(--color-fg-default);
        letter-spacing: -0.02em;
        line-height: 1.25;
      }

      .page-header p {
        color: var(--color-fg-muted);
        font-size: var(--text-base);
        margin-top: var(--space-2);
        max-width: 55ch;
      }

      .summary-row {
        display: flex;
        gap: var(--space-5);
        margin-top: var(--space-5);
        font-size: var(--text-sm);
        color: var(--color-fg-muted);
      }

      .summary-row strong {
        color: var(--color-fg-default);
        font-weight: 600;
      }

      /* --- Filters --- */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        gap: var(--space-3);
        align-items: flex-end;
        padding-bottom: var(--space-5);
        margin-bottom: var(--space-4);
        border-bottom: 1px solid var(--color-border-muted);
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
      }

      .field label {
        font-size: var(--text-xs);
        font-weight: 500;
        color: var(--color-fg-subtle);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .field input,
      .field select {
        font-family: var(--font-body);
        font-size: var(--text-sm);
        background: var(--color-canvas-inset);
        border: 1px solid var(--color-border-default);
        color: var(--color-fg-default);
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-md);
        min-width: 140px;
        transition: border-color 0.15s ease;
      }

      .field input:focus,
      .field select:focus {
        outline: 2px solid var(--color-accent);
        outline-offset: 1px;
        border-color: var(--color-accent);
      }

      .field input[type="text"] {
        min-width: 220px;
      }

      .clear-btn {
        font-family: var(--font-body);
        font-size: var(--text-sm);
        background: transparent;
        border: 1px solid var(--color-border-default);
        color: var(--color-fg-muted);
        padding: var(--space-2) var(--space-3);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease;
        margin-left: auto;
      }

      .clear-btn:hover {
        background: var(--color-canvas-subtle);
        color: var(--color-fg-default);
      }

      .clear-btn:focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 1px;
      }

      /* --- Results count --- */
      .results-meta {
        font-size: var(--text-sm);
        color: var(--color-fg-subtle);
        padding-bottom: var(--space-3);
      }

      /* --- PR list (table-like, closer to GitHub's actual issue list) --- */
      .pr-list {
        border: 1px solid var(--color-border-muted);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }

      .pr-item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: var(--space-3) var(--space-5);
        padding: var(--space-4) var(--space-5);
        border-bottom: 1px solid var(--color-border-muted);
        transition: background 0.1s ease;
      }

      .pr-item:last-child {
        border-bottom: none;
      }

      .pr-item:hover {
        background: var(--color-canvas-subtle);
      }

      .pr-title-line {
        display: flex;
        align-items: baseline;
        gap: var(--space-3);
        flex-wrap: wrap;
        min-width: 0;
      }

      .pr-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
        margin-top: 2px;
        color: var(--color-purple);
      }

      .pr-title-link {
        font-weight: 600;
        font-size: var(--text-base);
        color: var(--color-fg-default);
        text-decoration: none;
        line-height: 1.4;
      }

      .pr-title-link:hover {
        color: var(--color-accent);
      }

      .pr-title-link:focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
        border-radius: 2px;
      }

      .label {
        display: inline-block;
        font-size: var(--text-xs);
        font-weight: 500;
        padding: 1px var(--space-2);
        border-radius: 99px;
        line-height: 1.6;
        white-space: nowrap;
        border: 1px solid transparent;
      }

      .label-frontend {
        background: var(--color-cat-frontend-bg);
        color: var(--color-cat-frontend-fg);
        border-color: var(--color-cat-frontend-fg);
      }

      .label-backend {
        background: var(--color-cat-backend-bg);
        color: var(--color-cat-backend-fg);
        border-color: var(--color-cat-backend-fg);
      }

      .label-fullstack {
        background: var(--color-cat-fullstack-bg);
        color: var(--color-cat-fullstack-fg);
        border-color: var(--color-cat-fullstack-fg);
      }

      .label-other {
        background: var(--color-cat-other-bg);
        color: var(--color-cat-other-fg);
        border-color: var(--color-cat-other-fg);
      }

      .label-feature {
        background: var(--color-type-feature-bg);
        color: var(--color-type-feature-fg);
      }

      .label-fix {
        background: var(--color-type-fix-bg);
        color: var(--color-type-fix-fg);
      }

      .label-refactor {
        background: var(--color-type-refactor-bg);
        color: var(--color-type-refactor-fg);
      }

      .label-type-other {
        background: var(--color-type-other-bg);
        color: var(--color-type-other-fg);
      }

      .pr-meta-line {
        display: flex;
        align-items: center;
        gap: var(--space-3);
        font-size: var(--text-xs);
        color: var(--color-fg-subtle);
        margin-top: var(--space-1);
        grid-column: 1 / -1;
      }

      .pr-meta-line .repo {
        font-family: var(--font-mono);
        font-size: 0.6875rem;
        color: var(--color-fg-muted);
      }

      .pr-meta-line .diff {
        display: flex;
        gap: var(--space-2);
      }

      .additions {
        color: var(--color-success);
      }

      .deletions {
        color: var(--color-danger);
      }

      .pr-date {
        font-size: var(--text-xs);
        color: var(--color-fg-subtle);
        white-space: nowrap;
        text-align: right;
        padding-top: 2px;
      }

      .pr-summary {
        grid-column: 1 / -1;
        font-size: var(--text-sm);
        color: var(--color-fg-muted);
        line-height: 1.5;
        max-width: 70ch;
      }

      /* --- Empty / loading states --- */
      .empty-state {
        text-align: center;
        padding: var(--space-8) var(--space-5);
        color: var(--color-fg-subtle);
      }

      .empty-state p {
        font-size: var(--text-sm);
      }

      .loading-state {
        padding: var(--space-8) var(--space-5);
        text-align: center;
        color: var(--color-fg-subtle);
        font-size: var(--text-sm);
      }

      /* --- Responsive --- */
      @media (max-width: 640px) {
        .page {
          padding: var(--space-5) var(--space-4);
        }

        .filter-bar {
          flex-direction: column;
          align-items: stretch;
        }

        .field input,
        .field select {
          width: 100%;
          min-width: unset;
        }

        .clear-btn {
          margin-left: 0;
        }

        .pr-item {
          grid-template-columns: 1fr;
          padding: var(--space-3) var(--space-4);
        }

        .pr-date {
          text-align: left;
          order: -1;
        }

        .summary-row {
          flex-direction: column;
          gap: var(--space-2);
        }
      }

      /* --- Focus visible for keyboard nav --- */
      :focus-visible {
        outline: 2px solid var(--color-accent);
        outline-offset: 2px;
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
        }
      }

      /* Entry animation */
      @media (prefers-reduced-motion: no-preference) {
        .pr-item {
          animation: fadeUp 0.25s ease both;
        }

        @keyframes fadeUp {
          from {
            opacity: 0;
            transform: translateY(6px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page" role="main">
      <header class="page-header">
        <h1>Pull Requests</h1>
        <p>
          A record of merged contributions across repositories, filterable by
          category, type, and date.
        </p>
        <div class="summary-row" aria-live="polite">
          <span><strong id="total-prs">--</strong> merged PRs</span>
          <span>across <strong id="total-repos">--</strong> repositories</span>
          <span
            ><strong id="total-lines">--</strong> lines added total</span
          >
        </div>
      </header>

      <nav class="filter-bar" aria-label="Filter pull requests">
        <div class="field">
          <label for="search">Search</label>
          <input type="text" id="search" placeholder="Filter by title..." />
        </div>
        <div class="field">
          <label for="category">Category</label>
          <select id="category">
            <option value="">All</option>
            <option value="frontend">Frontend</option>
            <option value="backend">Backend</option>
            <option value="fullstack">Fullstack</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field">
          <label for="achievement">Type</label>
          <select id="achievement">
            <option value="">All</option>
            <option value="feature">Feature</option>
            <option value="fix">Fix</option>
            <option value="refactor">Refactor</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field">
          <label for="repository">Repository</label>
          <select id="repository">
            <option value="">All</option>
          </select>
        </div>
        <div class="field">
          <label for="start-date">From</label>
          <input type="month" id="start-date" />
        </div>
        <div class="field">
          <label for="end-date">To</label>
          <input type="month" id="end-date" />
        </div>
        <button class="clear-btn" type="button" onclick="clearFilters()">
          Clear
        </button>
      </nav>

      <div class="results-meta" id="results-count" aria-live="polite"></div>

      <div class="pr-list" id="pr-list" role="list">
        <div class="loading-state">Loading...</div>
      </div>
    </main>

    <script>
      let allPRs = [];
      let data = null;

      const mergedIcon = `<svg class="pr-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.45 5.154A4.25 4.25 0 0 0 9.25 7.5h1.378a2.251 2.251 0 1 1 0 1.5H9.25A5.734 5.734 0 0 1 5 7.123v3.505a2.25 2.25 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.95-.218ZM4.25 13.5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm8-9a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5ZM4.25 5a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z"></path></svg>`;

      async function loadData() {
        try {
          const response = await fetch("../prs.json?t=" + Date.now(), {
            cache: "no-store",
          });
          data = await response.json();

          allPRs = [];
          for (const category in data.by_category) {
            for (const repo in data.by_category[category]) {
              for (const pr of data.by_category[category][repo]) {
                allPRs.push(pr);
              }
            }
          }

          allPRs.sort((a, b) =>
            (b.merged_at || "").localeCompare(a.merged_at || ""),
          );

          document.getElementById("total-prs").textContent = data.total_prs;
          document.getElementById("total-repos").textContent = new Set(
            allPRs.map((pr) => pr.repository),
          ).size;

          const totalLines = allPRs.reduce(
            (sum, pr) => sum + (pr.lines_added || 0),
            0,
          );
          document.getElementById("total-lines").textContent =
            totalLines.toLocaleString();

          const repos = [...new Set(allPRs.map((pr) => pr.repository))].sort();
          const repoSelect = document.getElementById("repository");
          repos.forEach((repo) => {
            const opt = document.createElement("option");
            opt.value = repo;
            opt.textContent = repo.split("/").pop();
            repoSelect.appendChild(opt);
          });

          renderPRs(allPRs);
        } catch (error) {
          document.getElementById("pr-list").innerHTML =
            '<div class="empty-state"><p>Could not load prs.json</p></div>';
          console.error(error);
        }
      }

      function renderPRs(prs) {
        const container = document.getElementById("pr-list");

        if (prs.length === 0) {
          container.innerHTML =
            '<div class="empty-state"><p>No pull requests match these filters.</p></div>';
          document.getElementById("results-count").textContent = "0 results";
          return;
        }

        document.getElementById("results-count").textContent =
          `${prs.length} pull request${prs.length === 1 ? "" : "s"}`;

        container.innerHTML = prs
          .map(
            (pr, i) => `
          <div class="pr-item" role="listitem" style="animation-delay: ${Math.min(i * 0.03, 0.6)}s">
            <div class="pr-title-line">
              ${mergedIcon}
              <a class="pr-title-link" href="${pr.url}" target="_blank" rel="noopener">${escapeHtml(pr.title)}</a>
              <span class="label label-${pr.category}">${pr.category}</span>
              <span class="label label-${pr.achievement_type === "other" ? "type-other" : pr.achievement_type}">${pr.achievement_type}</span>
            </div>
            <div class="pr-date">
              <time datetime="${pr.merged_at}">${formatDate(pr.merged_at)}</time>
            </div>
            <div class="pr-meta-line">
              <span class="repo">${pr.repository}</span>
              <span class="diff">
                <span class="additions">+${(pr.lines_added || 0).toLocaleString()}</span>
                <span class="deletions">&minus;${(pr.lines_deleted || 0).toLocaleString()}</span>
              </span>
            </div>
            ${pr.summary ? `<div class="pr-summary">${escapeHtml(pr.summary)}</div>` : ""}
          </div>
        `,
          )
          .join("");
      }

      function filterPRs() {
        const search = document.getElementById("search").value.toLowerCase();
        const category = document.getElementById("category").value;
        const achievement = document.getElementById("achievement").value;
        const repository = document.getElementById("repository").value;
        const startDate = document.getElementById("start-date").value;
        const endDate = document.getElementById("end-date").value;

        const filtered = allPRs.filter((pr) => {
          if (
            search &&
            !pr.title.toLowerCase().includes(search) &&
            !(pr.summary || "").toLowerCase().includes(search)
          )
            return false;
          if (category && pr.category !== category) return false;
          if (achievement && pr.achievement_type !== achievement) return false;
          if (repository && pr.repository !== repository) return false;
          if (startDate || endDate) {
            const prDate = (pr.merged_at || "").substring(0, 7);
            if (startDate && prDate < startDate) return false;
            if (endDate && prDate > endDate) return false;
          }
          return true;
        });

        renderPRs(filtered);
      }

      function clearFilters() {
        document.getElementById("search").value = "";
        document.getElementById("category").value = "";
        document.getElementById("achievement").value = "";
        document.getElementById("repository").value = "";
        document.getElementById("start-date").value = "";
        document.getElementById("end-date").value = "";
        renderPRs(allPRs);
      }

      function formatDate(dateStr) {
        if (!dateStr) return "";
        const d = new Date(dateStr);
        return d.toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      function escapeHtml(text) {
        if (!text) return "";
        const el = document.createElement("span");
        el.textContent = text;
        return el.innerHTML;
      }

      document.getElementById("search").addEventListener("input", filterPRs);
      document
        .getElementById("category")
        .addEventListener("change", filterPRs);
      document
        .getElementById("achievement")
        .addEventListener("change", filterPRs);
      document
        .getElementById("repository")
        .addEventListener("change", filterPRs);
      document
        .getElementById("start-date")
        .addEventListener("change", filterPRs);
      document
        .getElementById("end-date")
        .addEventListener("change", filterPRs);

      loadData();
    </script>
  </body>
</html>
